<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF6B70"/>
      <stop offset="1" stop-color="#E14C50"/>
    </linearGradient>
    <!-- Un poisson blanc, orienté vers la droite (+x). Origine = centre du corps. -->
    <g id="fish">
      <path d="M -45 0 L -102 -44 Q -78 0 -102 44 Z" fill="#FFE3DA"/>
      <path d="M -6 -33 Q 8 -62 32 -30 Z" fill="#FFE3DA"/>
      <ellipse cx="0" cy="0" rx="63" ry="41" fill="#FFFFFF"/>
      <circle cx="37" cy="-7" r="5.2" fill="#E14C50"/>
    </g>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Le cardume : un banc qui nage en diagonale, vers le haut-droite -->
  <g transform="translate(500,505) rotate(-18) scale(1.12)">
    <use href="#fish" transform="translate(-235,70) scale(0.8)"/>
    <use href="#fish" transform="translate(-130,-25) scale(1.05)"/>
    <use href="#fish" transform="translate(40,95) scale(1.2)"/>
    <use href="#fish" transform="translate(70,-95) scale(1.3)"/>
    <use href="#fish" transform="translate(215,15) scale(1.7)"/>
  </g>
</svg>
